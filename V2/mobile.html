<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VECO Tehniku vaade</title>
  <style>
    :root {
      --bg:#07111a; --panel:#0f1d29; --panel2:#132638; --line:#254057;
      --text:#f1f7fc; --muted:#8fa6b8; --blue:#2286ff; --green:#19a76f;
      --amber:#f0a82f; --red:#e45757; --shadow:0 16px 42px rgba(0,0,0,.28);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:0}
    .app{min-height:100vh;display:grid;grid-template-rows:auto 1fr;background:radial-gradient(circle at top left, rgba(34,134,255,.12), transparent 42%), var(--bg)}
    .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(7,17,26,.94);backdrop-filter:blur(10px)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.03em;color:#2d9cff;font-size:28px;line-height:1}.brand small{display:block;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:0;text-transform:uppercase}.brand-stack{display:grid;gap:2px}
    .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.select,.field,textarea{border:1px solid var(--line);background:#0b1823;color:var(--text);border-radius:10px;min-height:40px;padding:0 10px}.select{min-width:180px}.btn{min-height:40px;border-radius:10px;padding:0 13px;background:#152b3e;color:var(--text);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn.amber{background:#3b2a11;border-color:#76501b;color:#ffd38a}.btn.red{background:#3b171b;border-color:#75333a;color:#ffb8bd}.btn.ghost{background:transparent}.layout{display:grid;grid-template-columns:minmax(320px,460px) minmax(0,1fr);gap:14px;padding:14px;min-width:0}.panel{background:rgba(15,29,41,.92);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);min-width:0;overflow:hidden}.panel-head{min-height:56px;padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-head h2{font-size:16px;margin:0}.panel-body{padding:14px;display:grid;gap:12px}.tabs{display:flex;gap:8px;overflow:auto}.tab{white-space:nowrap}.tab.active{background:var(--blue);border-color:var(--blue)}.job-list{display:grid;gap:10px}.job-card{width:100%;text-align:left;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:13px;padding:12px;display:grid;gap:8px}.job-card.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(34,134,255,.18)}.job-card.overdue{border-color:#b87528;background:#251f16}.job-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.job-id{font-size:12px;color:var(--muted);font-weight:800}.job-title{font-weight:900;font-size:16px;line-height:1.2}.job-meta{color:var(--muted);font-size:13px;line-height:1.35}.badge{width:max-content;max-width:100%;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;background:#19364e;color:#9fd0ff}.badge.uus{background:#e8eef4;color:#335167}.badge.planeeritud{background:#173852;color:#9fd0ff}.badge.töös{background:#0f4a34;color:#9dffd3}.badge.pausil{background:#3a2d5c;color:#d7c9ff}.badge.ootel{background:#4a1e22;color:#ffb8bd}.badge.täidetud,.badge.akt,.badge.saadetud{background:#103d2c;color:#adffd8}.quick-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.full{grid-column:1/-1}label{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:800}textarea{min-height:86px;padding:10px;resize:vertical}.empty{border:1px dashed var(--line);border-radius:13px;padding:18px;color:var(--muted);line-height:1.45}.section-title{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin:4px 0 -2px}.detail-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.detail-title h1{font-size:22px;margin:0;line-height:1.15}.kv{display:grid;grid-template-columns:120px minmax(0,1fr);gap:7px;font-size:14px}.kv span{color:var(--muted)}.timeline{display:grid;gap:6px}.time-row{border:1px solid var(--line);border-radius:10px;padding:9px;background:#0b1823;color:var(--muted);font-size:13px}.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.65)}.modal.open{display:flex}.dialog{width:min(920px,100%);max-height:92vh;overflow:hidden;background:#fff;color:#111;border-radius:14px;display:flex;flex-direction:column}.dialog-head,.dialog-actions{padding:14px 18px;border-bottom:1px solid #dce3e8;display:flex;align-items:center;justify-content:space-between;gap:10px}.dialog-actions{border-top:1px solid #dce3e8;border-bottom:0;justify-content:flex-end}.dialog-body{padding:18px;overflow:auto}.act-preview{font-family:Arial,sans-serif;color:#111;background:#fff}.act-top{text-align:center;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:12px}.act-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 20px;margin:10px 0}.act-box{border-bottom:1px solid #e5eaee;padding:7px 0;display:grid;grid-template-columns:120px 1fr;gap:10px}.act-box span{color:#59646d;font-size:12px}.signature-row{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:42px}.signature{border-top:1px solid #111;padding-top:7px}.statusline{font-size:12px;color:var(--muted)}
    @media(max-width:900px){.layout{grid-template-columns:1fr}.topbar{align-items:stretch;flex-direction:column}.controls{display:grid;grid-template-columns:1fr 1fr}.select,.btn{width:100%}.quick-actions{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}.brand{font-size:24px}}
    @media print{body *{visibility:hidden}.act-preview,.act-preview *{visibility:visible}.act-preview{position:absolute;inset:0;padding:28px}}
  
    .brand{gap:10px;}
    .brand-logo{height:32px;width:auto;display:block;object-fit:contain;}
    .brand>span{display:none;}
    .panel-head h2{display:none!important;}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;width:100%;overflow:visible;}
    .tab{white-space:nowrap;min-width:0;padding:0 10px;font-size:14px;}
    .tech-picker{position:relative;min-width:260px;}
    .tech-picker>summary{list-style:none;border:1px solid var(--line);background:#0b1823;color:var(--text);border-radius:10px;min-height:40px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;font-weight:800;}
    .tech-picker>summary::-webkit-details-marker{display:none;}
    .tech-picker>summary::after{content:"⌄";color:var(--muted);font-size:13px;}
    .tech-picker[open]>summary{border-color:var(--blue);box-shadow:0 0 0 3px rgba(34,134,255,.12);}
    .tech-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:30;width:min(340px,90vw);max-height:320px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#0b1823;box-shadow:var(--shadow);padding:8px;display:grid;gap:4px;}
    .tech-menu label{display:flex;align-items:center;gap:8px;min-height:34px;padding:7px 8px;border-radius:8px;color:var(--text);font-size:14px;font-weight:800;cursor:pointer;}
    .tech-menu label:hover{background:#152b3e;}
    .tech-menu input{width:16px;height:16px;accent-color:var(--blue);}
    @media(max-width:900px){.controls{display:grid;grid-template-columns:1fr;}.tech-picker{width:100%;min-width:0;}.tabs{grid-template-columns:repeat(4,minmax(0,1fr));}.tab{font-size:12px;padding:0 6px;}.brand-logo{height:28px;}}
</style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const STORAGE_KEY = "vecoPilotDataV1";
    const SUPABASE_CONFIG_KEY = "vecoSupabaseConfigV1";
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const statusLabels = { uus:"Uus", planeeritud:"Planeeritud", töös:"Töös", pausil:"Pausil", ootel:"Ootel", täidetud:"Täidetud", akt:"Akt", saadetud:"Saadetud", arhiveeritud:"Arhiveeritud" };
    let data = { people: [], peopleEvents: [], onCallShifts: [], projects: [], clients: [], jobs: [] };
    let selectedJobId = "";
    let filterMode = "active";
    let selectedTechNames = [];
    let remoteBusy = false;

    function escapeHtml(v){ return String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function dateKey(d){ const x = new Date(d); x.setMinutes(x.getMinutes()-x.getTimezoneOffset()); return x.toISOString().slice(0,10); }
    function nowStamp(){ const d=new Date(); return `${dateKey(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function today(){ return dateKey(new Date()); }
    function techNames(){
      const people = data.people || [];
      const names = people.filter(p => p.active !== false && String(p.role||"").toLowerCase() !== "admin").map(p => p.name).filter(Boolean);
      const fromJobs = (data.jobs||[]).flatMap(j => Array.isArray(j.technicians) ? j.technicians : [j.technician]).filter(Boolean);
      return [...new Set([...names, ...fromJobs])].sort((a,b)=>a.localeCompare(b,'et'));
    }
    function currentTechs(){ return selectedTechNames.slice(); }
    function jobTechs(job){ return Array.isArray(job.technicians) && job.technicians.length ? job.technicians : (job.technician ? [job.technician] : []); }
    function jobHasTech(job, techs){
      const selected = Array.isArray(techs) ? techs : [techs].filter(Boolean);
      if (!selected.length) return false;
      if (selected.includes("__ALL__")) return true;
      const selectedLower = selected.map(t => String(t).toLowerCase());
      return jobTechs(job).some(t => selectedLower.includes(String(t).toLowerCase()));
    }
    function activeStatuses(){ return ["uus","planeeritud","töös","pausil","ootel"]; }
    function totalMinutes(job){
      return (job.timeLogs||[]).reduce((sum, log) => {
        if (!log.start) return sum;
        const start = new Date(log.start.replace(' ', 'T'));
        const end = log.end ? new Date(log.end.replace(' ', 'T')) : new Date();
        const mins = Math.max(0, Math.round((end-start)/60000));
        return sum + mins;
      }, 0);
    }
    function formatMinutes(m){ const h=Math.floor(m/60), r=m%60; if(!m) return "0 h"; if(!h) return `${r} min`; return r ? `${h} h ${r} min` : `${h} h`; }
    function displayWindow(job){ return [job.time, job.endTime].filter(Boolean).join("-") || job.time || ""; }
    function readConfig(){ try{return JSON.parse(localStorage.getItem(SUPABASE_CONFIG_KEY)||"{}")}catch{return {}} }
    function parseRequestedTechs(techs){
      const params = new URLSearchParams(location.search);
      const requestedRaw = params.get("tech") || params.get("technicians") || localStorage.getItem("vecoMobileTechs") || "";
      if (!requestedRaw) return [];
      const parts = requestedRaw.split(/[|,;]/).map(x => x.trim()).filter(Boolean);
      if (parts.some(p => ["all","kõik","koik","__ALL__"].includes(p.toLowerCase()))) return techs.slice();
      const matches = [];
      for (const part of parts) {
        const match = techs.find(t => t.toLowerCase() === part.toLowerCase()) || techs.find(t => part.toLowerCase().includes(t.toLowerCase()));
        if (match && !matches.includes(match)) matches.push(match);
      }
      return matches;
    }
    function updateTechSummary(){
      const summary = $("#techSummary");
      const techs = techNames();
      if (!selectedTechNames.length) summary.textContent = "Vali tehnik";
      else if (selectedTechNames.length === techs.length) summary.textContent = "Kõik tehnikud";
      else if (selectedTechNames.length === 1) summary.textContent = selectedTechNames[0];
      else summary.textContent = `${selectedTechNames.length} tehnikut valitud`;
    }
    function saveTechSelection(){
      localStorage.setItem("vecoMobileTechs", selectedTechNames.join("|"));
      const u = new URL(location.href);
      if (selectedTechNames.length) u.searchParams.set("tech", selectedTechNames.join("|")); else u.searchParams.delete("tech");
      history.replaceState({}, "", u);
    }
    function populateTechs(){
      const menu = $("#techMenu");
      const techs = techNames();
      if (!selectedTechNames.length) selectedTechNames = parseRequestedTechs(techs);
      selectedTechNames = selectedTechNames.filter(t => techs.includes(t));
      const allChecked = techs.length && selectedTechNames.length === techs.length;
      menu.innerHTML = techs.length ? `
        <label><input type="checkbox" id="allTechsCheck" ${allChecked ? "checked" : ""}> Kõik tehnikud</label>
        ${techs.map(t => `<label><input type="checkbox" class="techCheck" value="${escapeHtml(t)}" ${selectedTechNames.includes(t) ? "checked" : ""}> ${escapeHtml(t)}</label>`).join("")}
      ` : `<div class="empty">Tehnikuid pole.</div>`;
      const all = $("#allTechsCheck");
      if (all) all.addEventListener("change", () => {
        selectedTechNames = all.checked ? techs.slice() : [];
        saveTechSelection(); selectedJobId = ""; populateTechs(); render();
      });
      menu.querySelectorAll('.techCheck').forEach(input => {
        input.addEventListener("change", () => {
          selectedTechNames = Array.from(menu.querySelectorAll('.techCheck:checked')).map(x => x.value);
          saveTechSelection(); selectedJobId = ""; updateTechSummary(); populateTechs(); render();
        });
      });
      updateTechSummary();
    }
    function isFinishedStatus(status){ return ["täidetud","akt","saadetud","arhiveeritud"].includes(status); }
    function isStarted(job){ return job.status === "töös" || job.status === "pausil" || (Array.isArray(job.timeLogs) && job.timeLogs.some(l => l.start)); }
    function isOverdueUnstarted(job){ return Boolean(job.date) && job.date < today() && !isStarted(job) && !isFinishedStatus(job.status); }
    function filteredJobs(){
      const techs = currentTechs();
      if (!techs.length) return [];
      let jobs = (data.jobs||[]).filter(j => jobHasTech(j, techs));
      if (filterMode === "active") jobs = jobs.filter(j => activeStatuses().includes(j.status));
      if (filterMode === "today") jobs = jobs.filter(j => j.date === today());
      if (filterMode === "overdue") jobs = jobs.filter(isOverdueUnstarted);
      return jobs.sort((a,b) => `${a.date||''} ${a.time||''}`.localeCompare(`${b.date||''} ${b.time||''}`));
    }
    function renderJobs(){
      const list = $("#jobList");
      const jobs = filteredJobs();
      list.innerHTML = jobs.map(job => {
        const overdue = isOverdueUnstarted(job);
        return `<button class="job-card ${job.id===selectedJobId?'selected':''} ${overdue?'overdue':''}" data-job="${escapeHtml(job.id)}">
          <div class="job-row"><span class="job-id">${escapeHtml(job.date||'')} · ${escapeHtml(displayWindow(job))}</span><span class="job-id">${escapeHtml(job.id||'')}</span></div>
          <div class="job-title">${escapeHtml(job.client||'Töökäsk')}</div>
          <div class="job-meta">${escapeHtml(job.address||'')}</div>
          ${job.buildingPart ? `<div class="job-meta">Hooneosa: ${escapeHtml(job.buildingPart)}</div>` : ""}
          ${job.device ? `<div class="job-meta">Seade: ${escapeHtml(job.device)}</div>` : ""}
          <span class="badge ${escapeHtml(job.status||'uus')}">${escapeHtml(statusLabels[job.status] || job.status || 'Uus')}</span>
        </button>`;
      }).join("") || `<div class="empty">${selectedTechNames.length ? "Selle valikuga ei ole kuvatavaid töid." : "Vali ülevalt üks või mitu tehnikut."}</div>`;
      list.querySelectorAll('[data-job]').forEach(btn => btn.addEventListener('click', () => { selectedJobId = selectedJobId === btn.dataset.job ? "" : btn.dataset.job; render(); }));
    }
    function selectedJob(){ return (data.jobs||[]).find(j => j.id === selectedJobId); }
    function updateStatus(status){
      const job = selectedJob(); if (!job) return;
      job.timeLogs = job.timeLogs || [];
      const open = job.timeLogs.find(l => l.start && !l.end);
      if (status === "töös" && !open) job.timeLogs.push({ start: nowStamp(), end: "" });
      if (["pausil","täidetud"].includes(status) && open) open.end = nowStamp();
      job.status = status;
      const mins = totalMinutes(job); if (mins) job.hours = formatMinutes(mins);
      if (status === "täidetud" && !job.workDone) job.workDone = "Töö teostatud.";
      saveLocal(); render();
    }
    function saveDetails(){
      const job = selectedJob(); if (!job) return;
      job.workDone = $("#workDone")?.value || "";
      job.materials = $("#materials")?.value || "";
      job.notes = $("#notes")?.value || "";
      job.hours = $("#hours")?.value || job.hours || "";
      saveLocal(); render();
    }
    function renderDetail(){
      const box = $("#jobDetail"); const job = selectedJob();
      if (!job) { box.innerHTML = `<div class="empty">Vali vasakult töökäsk.</div>`; return; }
      const running = (job.timeLogs||[]).some(l => l.start && !l.end);
      box.innerHTML = `
        <div class="detail-title"><h1>${escapeHtml(job.client||'Töökäsk')}</h1><span class="badge ${escapeHtml(job.status||'uus')}">${escapeHtml(statusLabels[job.status] || job.status || 'Uus')}</span></div>
        <div class="kv"><span>Kuupäev</span><strong>${escapeHtml(job.date||'')} ${escapeHtml(displayWindow(job))}</strong><span>Tehnik</span><strong>${escapeHtml(jobTechs(job).join(', '))}</strong><span>Aadress</span><strong>${escapeHtml(job.address||'')}</strong><span>Hooneosa</span><strong>${escapeHtml(job.buildingPart||'-')}</strong><span>Seade</span><strong>${escapeHtml(job.device||'-')}</strong><span>Tööaeg</span><strong>${escapeHtml(job.hours || formatMinutes(totalMinutes(job)))}</strong></div>
        <div class="quick-actions">
          <button class="btn green" id="startBtn">${running ? 'Töös' : 'Alusta'}</button>
          <button class="btn amber" id="pauseBtn">Paus</button>
          <button class="btn primary" id="finishBtn">Lõpeta</button>
        </div>
        <div class="form-grid">
          <label class="full">Tehtud töö<textarea id="workDone" placeholder="Kirjelda tehtud töö...">${escapeHtml(job.workDone||'')}</textarea></label>
          <label class="full">Materjalid<textarea id="materials" placeholder="Kasutatud materjalid...">${escapeHtml(job.materials||'')}</textarea></label>
          <label class="full">Märkused<textarea id="notes" placeholder="Lisamärkused / puudused...">${escapeHtml(job.notes||'')}</textarea></label>
          <label>Kulunud aeg<input class="field" id="hours" value="${escapeHtml(job.hours || formatMinutes(totalMinutes(job)))}"></label>
          <label>Viide<input class="field" value="${escapeHtml(job.referenceNo||'')}" readonly></label>
        </div>
        <button class="btn primary" id="saveBtn">✓ Salvesta info</button>
        <div class="section-title">Ajajoon</div>
        <div class="timeline">${(job.timeLogs||[]).map(l => `<div class="time-row">${escapeHtml(l.start)} → ${escapeHtml(l.end || 'käib')}</div>`).join('') || `<div class="time-row">Ajalogi puudub.</div>`}</div>`;
      $("#startBtn").onclick = () => updateStatus("töös");
      $("#pauseBtn").onclick = () => updateStatus("pausil");
      $("#finishBtn").onclick = () => { saveDetails(); updateStatus("täidetud"); };
      $("#saveBtn").onclick = saveDetails;
    }
    function render(){ renderJobs(); renderDetail(); }
    async function init(){
      loadLocal(); await loadRemote(); populateTechs();
      $("#refreshBtn").onclick = async () => { await loadRemote(); populateTechs(); render(); };
      render();
    }
    init();
  </script>
</body>
</html>
